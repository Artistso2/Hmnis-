<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

            <figcaption id="imageCaption">Glass Horizons</figcaption>

          <div class="gallery-strip" aria-label="Author-provided visual theme assets">
            <button class="thumb" type="button" data-target="assets/glass_horizon_icon.png" aria-label="Glass icon"><img src="assets/glass_horizon_icon.png" alt=""></button>
            <button class="thumb" type="button" data-target="assets/portrait_headphones.jpg" aria-label="Portrait headphones"><img src="assets/portrait_headphones.jpg" alt=""></button>

            <button class="thumb" type="button" data-target="assets/art_01.jpg" aria-label="Artwork 1"><img src="assets/art_01.jpg" alt=""></button>
            <button class="thumb" type="button" data-target="assets/art_02.jpg" aria-label="Artwork 2"><img src="assets/art_02.jpg" alt=""></button>
            <button class="thumb" type="button" data-target="assets/art_03.jpg" aria-label="Artwork 3"><img src="assets/art_03.jpg" alt=""></button>
            <button class="thumb" type="button" data-target="assets/art_04.jpg" aria-label="Artwork 4"><img src="assets/art_04.jpg" alt=""></button>
            <button class="thumb" type="button" data-target="assets/art_05.jpg" aria-label="Artwork 5"><img src="assets/art_05.jpg" alt=""></button>
          </div>
        </aside>

        <section class="text-panel">
          <div class="meta-row">
            <span id="date">—</span>
            <span id="location">—</span>
          </div>
          <p class="kicker">VISUAL WRIT / AUTHOR-CONTROLLED WEB NOVEL</p>
          <h1 id="title">HELLO, MY NAME IS STEVEN</h1>
          <p id="subtitle">Author-controlled visual novel scaffold</p>
          <div class="speaker" id="speaker">Steven</div>
          <div class="text-box" id="text"></div>
          <div class="tags" id="tags"></div>
          <div class="choices" id="choices"></div>

          <div class="plugin-bar" aria-label="Project tools">
            <button id="searchToggle" type="button">Search Nodes</button>
            <a href="../downloads/hello_my_name_is_steven.epub" download>Download EPUB</a>
            <a href="landing.html">Landing</a>
            <a href="design-lab.html">Design Lab</a>
            <a href="map.html">Timeline Map</a>
            <a href="https://github.com/Artistso2/Hmnis-" target="_blank" rel="noopener">GitHub</a>
          </div>
          <div id="searchPanel" class="search-panel" hidden>
            <label for="searchInput">Search the visual novel scaffold</label>
            <input id="searchInput" type="search" placeholder="Search tags, dates, body log, recursion…">
            <div id="searchResults" class="search-results"></div>
          </div>
        </section>
      </article>
    </section>

    <footer>
      <button id="backBtn" type="button">Back</button>
      <button id="resetBtn" type="button">Reset</button>
      <span class="rule">No invented facts. Steven’s words are the source.</span>
