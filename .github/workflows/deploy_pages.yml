name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Extract timeline candidates
        run: python3 scripts/extract_timeline_candidates.py

      - name: Build map exports
        run: python3 scripts/build_map_exports.py

      - name: Build EPUB
        run: python3 scripts/build_epub.py

      - name: Copy EPUB to downloads
        run: |
          cp output/hello_my_name_is_steven.epub downloads/hello_my_name_is_steven.epub

      - name: Verify build outputs
        run: |
          test -f output/hello_my_name_is_steven.epub
          test -f downloads/hello_my_name_is_steven.epub
          test -f index.html
          test -f web/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
